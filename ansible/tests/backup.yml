---
- name: Validate K8up backup and restore contracts
  hosts: localhost
  gather_facts: false
  vars:
    backup_test_repo_root: "{{ playbook_dir }}/../.."
    backup_operator_surface_files:
      - Taskfile.yaml
      - README.md
      - docs/dr/restore.md
      - docs/dr/drill.md
    backup_removed_paths:
      - ansible/playbooks/backup-status.yml
      - ansible/playbooks/backup-check.yml
      - ansible/playbooks/backup-snapshots.yml
      - ansible/playbooks/dr-drill.yml
      - ansible/playbooks/restore-app.yml
      - ansible/playbooks/restore-all-appdata.yml
      - ansible/roles/backup
    backup_schedule_files:
      - apps/home-automation/home-automation-backup/manifests/home-automation-backup-appdata.schedule.yaml
      - apps/media/media-backup/manifests/media-backup-appdata.schedule.yaml
      - apps/selfhosted/selfhosted-backup/manifests/selfhosted-backup-appdata.schedule.yaml
    backup_credential_files:
      - apps/home-automation/home-automation-backup/manifests/home-automation-backup-credentials.externalsecret.yaml
      - apps/media/media-backup/manifests/media-backup-credentials.externalsecret.yaml
      - apps/selfhosted/selfhosted-backup/manifests/selfhosted-backup-credentials.externalsecret.yaml

  tasks:
    - name: Read backup operator surface files
      ansible.builtin.slurp:
        src: "{{ backup_test_repo_root }}/{{ item }}"
      loop: "{{ backup_operator_surface_files }}"
      register: backup_operator_surface_file_contents

    - name: Assert custom backup operator commands are removed
      ansible.builtin.assert:
        that:
          - "'backup:status' not in (item.content | b64decode)"
          - "'backup:snapshots' not in (item.content | b64decode)"
          - "'backup:check' not in (item.content | b64decode)"
          - "'restore:app' not in (item.content | b64decode)"
          - "'restore:all-appdata' not in (item.content | b64decode)"
          - "'dr:drill' not in (item.content | b64decode)"
          - "'backup-status.yml' not in (item.content | b64decode)"
          - "'restore-app.yml' not in (item.content | b64decode)"
          - "'dr-drill.yml' not in (item.content | b64decode)"
        fail_msg: "Custom backup operator command remains in {{ item.item }}"
      loop: "{{ backup_operator_surface_file_contents.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check removed backup orchestration paths
      ansible.builtin.stat:
        path: "{{ backup_test_repo_root }}/{{ item }}"
      loop: "{{ backup_removed_paths }}"
      register: backup_removed_path_stats

    - name: Assert custom backup orchestration paths are gone
      ansible.builtin.assert:
        that:
          - not item.stat.exists
        fail_msg: "Custom backup orchestration path still exists: {{ item.item }}"
      loop: "{{ backup_removed_path_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read K8up schedules
      ansible.builtin.slurp:
        src: "{{ backup_test_repo_root }}/{{ item }}"
      loop: "{{ backup_schedule_files }}"
      register: backup_schedule_file_contents

    - name: Parse K8up schedules
      ansible.builtin.set_fact:
        backup_schedules: "{{ backup_schedules | default([]) + [item.content | b64decode | from_yaml] }}"
      loop: "{{ backup_schedule_file_contents.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Assert K8up schedules own backup lifecycle
      ansible.builtin.assert:
        that:
          - backup_schedules | length == 3
          - backup_schedules | map(attribute='kind') | unique | list == ['Schedule']
          - backup_schedules | map(attribute='apiVersion') | unique | list == ['k8up.io/v1']
          - backup_schedules | map(attribute='metadata.namespace') | sort | list == ['home-automation', 'media', 'selfhosted']
          - backup_schedules | map(attribute='spec.backend.rest.userSecretRef.key') | unique | list == ['RESTIC_USERNAME']
          - backup_schedules | map(attribute='spec.backend.rest.passwordSecretReg.key') | unique | list == ['RESTIC_PASSWORD']
          - backup_schedules | map(attribute='spec.backend.repoPasswordSecretRef.key') | unique | list == ['RESTIC_PASSWORD']
          - backup_schedules | selectattr('spec.backup.schedule', 'defined') | list | length == 3
          - backup_schedules | selectattr('spec.check.schedule', 'defined') | list | length == 3
          - backup_schedules | selectattr('spec.prune.schedule', 'defined') | list | length == 3

    - name: Read K8up credential ExternalSecrets
      ansible.builtin.slurp:
        src: "{{ backup_test_repo_root }}/{{ item }}"
      loop: "{{ backup_credential_files }}"
      register: backup_credential_file_contents

    - name: Parse K8up credential ExternalSecrets
      ansible.builtin.set_fact:
        backup_credentials: "{{ backup_credentials | default([]) + [item.content | b64decode | from_yaml] }}"
      loop: "{{ backup_credential_file_contents.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Assert namespace-local K8up credentials are generated
      ansible.builtin.assert:
        that:
          - backup_credentials | length == 3
          - backup_credentials | map(attribute='kind') | unique | list == ['ExternalSecret']
          - backup_credentials | map(attribute='metadata.name') | unique | list == ['k8up-restic-credentials']
          - backup_credentials | map(attribute='metadata.namespace') | sort | list == ['home-automation', 'media', 'selfhosted']
          - backup_credentials | map(attribute='spec.target.template.data.RESTIC_USERNAME') | unique | list == ['restic']
          - backup_credentials | map(attribute='spec.target.template.data.RESTIC_PASSWORD') | unique | list == [('{' ~ '{ .restic_password }' ~ '}')]

    - name: Assert restore runbook is K8up-native
      ansible.builtin.assert:
        that:
          - "'kind: Restore' in (backup_operator_surface_file_contents.results | selectattr('item', 'equalto', 'docs/dr/restore.md') | first).content | b64decode"
          - "'restoreMethod:' in (backup_operator_surface_file_contents.results | selectattr('item', 'equalto', 'docs/dr/restore.md') | first).content | b64decode"
          - "'paths:' in (backup_operator_surface_file_contents.results | selectattr('item', 'equalto', 'docs/dr/restore.md') | first).content | b64decode"
          - "'kubectl get snapshots.k8up.io' in (backup_operator_surface_file_contents.results | selectattr('item', 'equalto', 'docs/dr/restore.md') | first).content | b64decode"
          - "'kind: PersistentVolumeClaim' in (backup_operator_surface_file_contents.results | selectattr('item', 'equalto', 'docs/dr/drill.md') | first).content | b64decode"
          - "'kubectl apply' in (backup_operator_surface_file_contents.results | selectattr('item', 'equalto', 'docs/dr/drill.md') | first).content | b64decode"
        fail_msg: "DR runbooks must document manual K8up-native restore and drill flows."
