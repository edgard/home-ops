---
- name: Apply Bitwarden credentials secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    context: "{{ kube_context }}"
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: bitwarden-credentials
        namespace: platform-system
      stringData:
        token: "{{ platform_bitwarden_access_token }}"
  no_log: true

- name: Apply External Secrets bootstrap manifests
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    context: "{{ kube_context }}"
    state: present
    apply: true
    src: "{{ repo_root }}/{{ item }}"
  loop: "{{ platform_external_secrets_bootstrap_manifests }}"
  loop_control:
    label: "{{ item | basename }}"

- name: Wait for External Secrets certificate
  ansible.builtin.include_tasks: wait_items.yml
  vars:
    platform_wait_items: "{{ platform_external_secrets_waits | selectattr('kind', 'equalto', 'Certificate') | list }}"

- name: Install external-secrets bootstrap release
  ansible.builtin.include_tasks: install_release.yml
  vars:
    platform_release_spec: "{{ platform_bootstrap_release_specs | selectattr('phase', 'equalto', 'external-secrets') | first }}"

- name: Apply External Secrets store
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    context: "{{ kube_context }}"
    state: present
    apply: true
    src: "{{ repo_root }}/{{ platform_external_secrets_store_manifest }}"

- name: Wait for Bitwarden SDK server
  ansible.builtin.include_tasks: wait_items.yml
  vars:
    platform_wait_items: "{{ platform_external_secrets_waits | selectattr('name', 'equalto', 'bitwarden-sdk-server') | list }}"

- name: Restart external-secrets after store creation
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    context: "{{ kube_context }}"
    state: patched
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: external-secrets
        namespace: platform-system
      spec:
        template:
          metadata:
            annotations:
              ansible.home-ops/restarted-at: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

- name: Wait for external-secrets rollout
  ansible.builtin.include_tasks: wait_items.yml
  vars:
    platform_wait_items: "{{ platform_external_secrets_waits | selectattr('name', 'equalto', 'external-secrets') | list }}"
