---
- name: Require Terraform credentials
  ansible.builtin.assert:
    that:
      - tofu_aws_access_key_id | length > 0
      - tofu_aws_secret_access_key | length > 0
      - tofu_bws_access_token | length > 0
    fail_msg: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and BWS_ACCESS_TOKEN are required for Terraform apply.
  no_log: true

- name: Apply Terraform infrastructure
  community.general.terraform:
    project_path: "{{ tofu_project_path }}"
    binary_path: "{{ tofu_binary_path }}"
    state: present
    force_init: true
  environment:
    AWS_ACCESS_KEY_ID: "{{ tofu_aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ tofu_aws_secret_access_key }}"
    BWS_ACCESS_TOKEN: "{{ tofu_bws_access_token }}"
    BW_ACCESS_TOKEN: "{{ tofu_bws_access_token }}"
  no_log: true
