---
- name: Run restic job and collect logs
  block:
    - name: Apply restic job
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: present
        definition: "{{ backup_job_definition }}"

    - name: Wait for restic job to finish
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        api_version: batch/v1
        kind: Job
        namespace: "{{ backup_job_definition.metadata.namespace }}"
        name: "{{ backup_job_definition.metadata.name }}"
      register: backup_job_status
      changed_when: false
      failed_when: false
      until: >-
        backup_job_status.resources | length == 1
        and (
          (
            backup_job_status.resources[0].status.conditions | default([])
            | selectattr('type', 'equalto', 'Complete')
            | selectattr('status', 'equalto', 'True')
            | list
            | length
          ) > 0
          or (
            backup_job_status.resources[0].status.conditions | default([])
            | selectattr('type', 'equalto', 'Failed')
            | selectattr('status', 'equalto', 'True')
            | list
            | length
          ) > 0
        )
      retries: "{{ (backup_job_wait_timeout / backup_job_wait_sleep) | int }}"
      delay: "{{ backup_job_wait_sleep }}"

    - name: Record restic job result
      ansible.builtin.set_fact:
        backup_job_succeeded: >-
          {{
            (
              backup_job_status.resources[0].status.conditions | default([])
              | selectattr('type', 'equalto', 'Complete')
              | selectattr('status', 'equalto', 'True')
              | list
              | length
            ) > 0
          }}
        backup_job_failed: >-
          {{
            (
              backup_job_status.resources[0].status.conditions | default([])
              | selectattr('type', 'equalto', 'Failed')
              | selectattr('status', 'equalto', 'True')
              | list
              | length
            ) > 0
          }}
  always:
    - name: Read restic job logs
      kubernetes.core.k8s_log:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        namespace: "{{ backup_job_definition.metadata.namespace }}"
        label_selectors:
          - "job-name={{ backup_job_definition.metadata.name }}"
      register: backup_job_logs
      failed_when: false

    - name: Print restic job logs
      ansible.builtin.debug:
        msg: "{{ backup_job_logs.log_lines | default([]) }}"

- name: Assert restic job succeeded
  ansible.builtin.assert:
    that:
      - backup_job_succeeded | default(false) | bool
      - not (backup_job_failed | default(false) | bool)
    fail_msg: "Restic job {{ backup_job_definition.metadata.namespace }}/{{ backup_job_definition.metadata.name }} failed or timed out."
