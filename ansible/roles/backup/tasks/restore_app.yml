---
- name: Require destructive restore confirmation
  ansible.builtin.assert:
    that:
      - backup_confirm == "RESTORE"
    fail_msg: "Set confirm=RESTORE to run restore:app."

- name: Load app restore context
  ansible.builtin.include_tasks: load_app.yml

- name: Assert app uses restic appdata restore
  ansible.builtin.assert:
    that:
      - backup_app_restore_mode == "restic-appdata"
      - backup_app_local_pvc_names | length == 1
      - backup_app_restore_paths | length > 0
      - not (backup_app_has_name_override | bool)
      - not (backup_app_has_fullname_override | bool)
    fail_msg: "App {{ backup_app }} must use dr.restore.mode restic-appdata, define exactly one local PVC, and avoid nameOverride/fullnameOverride to use restore:app."

- name: Set restore timestamp
  ansible.builtin.set_fact:
    backup_restore_timestamp: "{{ lookup('ansible.builtin.pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"

- name: Build Argo CD pause and resume patches
  ansible.builtin.set_fact:
    backup_argocd_pause_patch:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: "{{ backup_application_name }}"
        namespace: "{{ backup_argocd_namespace }}"
        annotations:
          argocd.argoproj.io/skip-reconcile: "true"
    backup_argocd_resume_patch:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: "{{ backup_application_name }}"
        namespace: "{{ backup_argocd_namespace }}"
        annotations:
          argocd.argoproj.io/skip-reconcile:

- name: Build restore job
  ansible.builtin.include_tasks: build_job.yml
  vars:
    backup_job_name: "restic-restore-{{ backup_app_name }}-{{ lookup('ansible.builtin.pipe', 'date -u +%Y%m%d%H%M%S') }}"
    backup_job_component: restore
    backup_job_volumes:
      - name: appdata
        persistentVolumeClaim:
          claimName: "{{ backup_appdata_claim }}"
    backup_job_volume_mounts:
      - name: appdata
        mountPath: "{{ backup_restore_root }}"
    backup_job_script: |
      set -eu
      RESTORE_TIMESTAMP="{{ backup_restore_timestamp }}"
      restore_in_progress=0
      restore_target=
      restore_archive=

      restore_rollback() {
        restore_status=$?
        if [ "$restore_status" -ne 0 ] && [ "$restore_in_progress" = "1" ] && [ -n "$restore_target" ] && [ ! -e "$restore_target" ] && [ -e "$restore_archive" ]; then
          mv "$restore_archive" "$restore_target"
        fi
        exit "$restore_status"
      }
      trap restore_rollback EXIT

      {% for restore_path in backup_app_restore_paths %}
      # restore target: {{ backup_restore_root }}/{{ restore_path }}
      {% endfor %}
      for RESTORE_INCLUDE in {% for restore_path in backup_app_restore_paths %}"/data/appdata/{{ restore_path }}" {% endfor %}; do
        RESTORE_PATH="${RESTORE_INCLUDE#/data/appdata/}"
        case "$RESTORE_PATH" in
          /*|*..*) echo "Refusing unsafe restore path: $RESTORE_PATH"; exit 1 ;;
        esac

        rm -rf {{ backup_restore_staging }}
        mkdir -p {{ backup_restore_staging }}
        restic restore "$RESTIC_SNAPSHOT" \
          --host {{ backup_restic_host }} \
          --tag {{ backup_restic_tag }} \
          --include "$RESTORE_INCLUDE" \
          --target {{ backup_restore_staging }}

        STAGED="{{ backup_restore_staging }}/data/appdata/${RESTORE_PATH}"
        TARGET="{{ backup_restore_root }}/${RESTORE_PATH}"
        SAFE_PATH="$(printf '%s' "$RESTORE_PATH" | tr '/' '-')"
        ARCHIVE="{{ backup_restore_root }}/.pre-restore/{{ backup_app_name }}-${RESTORE_TIMESTAMP}-${SAFE_PATH}"

        test -d "$STAGED"
        find "$STAGED" -mindepth 1 -print -quit | grep -q .
        restore_target="$TARGET"
        restore_archive="$ARCHIVE"
        restore_in_progress=0
        if [ -e "$TARGET" ]; then
          mkdir -p "$(dirname "$ARCHIVE")"
          mv "$TARGET" "$ARCHIVE"
          restore_in_progress=1
        fi
        mkdir -p "$(dirname "$TARGET")"
        mv "$STAGED" "$TARGET"
        restore_in_progress=0
      done
    backup_job_env_extra:
      - name: RESTIC_SNAPSHOT
        value: "{{ backup_snapshot }}"

- name: Record restore job
  ansible.builtin.set_fact:
    backup_restore_job: "{{ backup_job_definition }}"

- name: Run app restore
  when: not (backup_test_mode | bool)
  block:
    - name: Pause Argo CD reconciliation for app
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition: "{{ backup_argocd_pause_patch }}"

    - name: Read app Deployments
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ backup_app_namespace }}"
        label_selectors:
          - "app.kubernetes.io/instance={{ backup_app_name }}"
      register: backup_restore_deployments

    - name: Read app CronJobs
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        api_version: batch/v1
        kind: CronJob
        namespace: "{{ backup_app_namespace }}"
        label_selectors:
          - "app.kubernetes.io/instance={{ backup_app_name }}"
      register: backup_restore_cronjobs

    - name: Record app workload state
      ansible.builtin.set_fact:
        backup_restore_original_deployments: "{{ backup_restore_deployments.resources }}"
        backup_restore_original_cronjobs: "{{ backup_restore_cronjobs.resources }}"

    - name: Scale app Deployments down
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ item.metadata.name }}"
            namespace: "{{ item.metadata.namespace }}"
          spec:
            replicas: 0
      loop: "{{ backup_restore_original_deployments }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"

    - name: Suspend app CronJobs
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: "{{ item.metadata.name }}"
            namespace: "{{ item.metadata.namespace }}"
          spec:
            suspend: true
      loop: "{{ backup_restore_original_cronjobs }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"

    - name: Run restore job
      ansible.builtin.include_tasks: run_job.yml
      vars:
        backup_job_definition: "{{ backup_restore_job }}"
  always:
    - name: Restore app Deployment replicas
      when: backup_restore_original_deployments is defined
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ item.metadata.name }}"
            namespace: "{{ item.metadata.namespace }}"
          spec:
            replicas: "{{ item.spec.replicas | default(1) }}"
      loop: "{{ backup_restore_original_deployments | default([]) }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"

    - name: Restore app CronJob suspend state
      when: backup_restore_original_cronjobs is defined
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: "{{ item.metadata.name }}"
            namespace: "{{ item.metadata.namespace }}"
          spec:
            suspend: "{{ item.spec.suspend | default(false) }}"
      loop: "{{ backup_restore_original_cronjobs | default([]) }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"

    - name: Resume Argo CD reconciliation for app
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition: "{{ backup_argocd_resume_patch }}"

    - name: Refresh restored Argo CD application
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        state: patched
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "{{ backup_application_name }}"
            namespace: "{{ backup_argocd_namespace }}"
            annotations:
              argocd.argoproj.io/refresh: hard
