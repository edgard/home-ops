---
name: Pull Request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set Up Toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          profile: format

      - name: Run Format Check
        run: task fmt:check

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set Up Toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          profile: static

      - name: Run Static Analysis
        run: task lint:static

      - name: Run Workflow Validation
        run: task lint:workflows

  ansible:
    name: Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set Up Toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          profile: ansible

      - name: Set Up Ansible
        run: task deps

      - name: Run Ansible Validation
        run: task lint:ansible

  kubernetes:
    name: Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set Up Toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          profile: kubernetes

      - name: Run Kubernetes Validation
        run: task lint:kubernetes

  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set Up Toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          profile: terraform

      - name: Run Terraform Validation
        run: task lint:terraform

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - format
      - static-analysis
      - ansible
      - kubernetes
      - terraform
    if: ${{ always() }}

    steps:
      - name: Check Job Results
        run: |-
          failed=0

          check_result() {
            local job="$1"
            local result="$2"

            if [[ "$result" != "success" ]]; then
              echo "::error::${job} result: ${result}"
              failed=1
            fi
          }

          check_result "Format" "${{ needs.format.result }}"
          check_result "Static Analysis" "${{ needs.static-analysis.result }}"
          check_result "Ansible" "${{ needs.ansible.result }}"
          check_result "Kubernetes" "${{ needs.kubernetes.result }}"
          check_result "Terraform" "${{ needs.terraform.result }}"

          exit "$failed"
