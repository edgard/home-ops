---
name: Setup Home Ops Toolchain
description: Install pinned tools for Home Ops CI jobs.

inputs:
  profile:
    description: "Tool profile to install: format, static, ansible, kubernetes, terraform."
    required: true

runs:
  using: composite
  steps:
    - name: Validate Profile
      shell: bash
      run: |
        case "${{ inputs.profile }}" in
          format | static | ansible | kubernetes | terraform)
            ;;
          *)
            echo "::error::Unsupported toolchain profile: ${{ inputs.profile }}"
            exit 1
            ;;
        esac

    - name: Set Up Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        # renovate: datasource=github-releases depName=go-task/task
        version: 3.52.0

    - name: Set Up Node
      if: ${{ inputs.profile == 'format' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24

    - name: Set Up Helm
      if: ${{ inputs.profile == 'kubernetes' }}
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        # renovate: datasource=github-releases depName=helm/helm
        version: v4.2.3

    - name: Set Up OpenTofu
      if: ${{ inputs.profile == 'format' || inputs.profile == 'ansible' || inputs.profile == 'terraform' }}
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      with:
        # renovate: datasource=github-releases depName=opentofu/opentofu
        tofu_version: 1.12.3
        tofu_wrapper: false

    - name: Set Up yq
      if: ${{ inputs.profile == 'kubernetes' }}
      uses: dcarbone/install-yq-action@4075b4dca348d74bd83f2bf82d30f25d7c54539b # v1.3.1
      with:
        # renovate: datasource=github-tags depName=mikefarah/yq
        version: v4.53.3

    - name: Set Up pluto
      if: ${{ inputs.profile == 'kubernetes' }}
      uses: FairwindsOps/pluto/github-action@dd5ec8cccce5e42dfe8054b8250baa35546056a0 # v5.24.0
      with:
        # renovate: datasource=docker depName=us-docker.pkg.dev/fairwinds-ops/oss/pluto
        IMAGE_TAG: v5.23

    - name: Set Up kubeconform
      if: ${{ inputs.profile == 'kubernetes' }}
      uses: bmuschko/setup-kubeconform@e5d264ec1eafe2314e750c429a9da7639dd5a003 # v1.1.0
      with:
        # renovate: datasource=github-releases depName=yannh/kubeconform
        kubeconform-version: "0.8.0"

    - name: Set Up Conftest
      if: ${{ inputs.profile == 'kubernetes' }}
      uses: princespaghetti/setup-conftest@417586a9b2e806fc5a95c72dfe98e296ef092b6f # v1.2.0
      with:
        # renovate: datasource=github-releases depName=open-policy-agent/conftest
        version: 0.68.2

    - name: Install APT Tools
      if: ${{ inputs.profile == 'static' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck yamllint

    - name: Install Prettier
      if: ${{ inputs.profile == 'format' }}
      shell: bash
      env:
        # renovate: datasource=npm depName=prettier
        PRETTIER_VERSION: 3.9.5
      run: npm install --global "prettier@${PRETTIER_VERSION}"

    - name: Install yamlfmt
      if: ${{ inputs.profile == 'format' }}
      shell: bash
      env:
        # renovate: datasource=github-releases depName=google/yamlfmt
        YAMLFMT_VERSION: v0.21.0
      run: |
        version="${YAMLFMT_VERSION#v}"
        archive="yamlfmt_${version}_Linux_x86_64.tar.gz"
        checksum="checksums.txt"
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT

        curl -fsSLo "$tmp/$archive" "https://github.com/google/yamlfmt/releases/download/${YAMLFMT_VERSION}/${archive}"
        curl -fsSLo "$tmp/$checksum" "https://github.com/google/yamlfmt/releases/download/${YAMLFMT_VERSION}/${checksum}"

        grep "  ${archive}$" "$tmp/$checksum" | (cd "$tmp" && sha256sum --check --status)
        sudo tar -xzf "$tmp/$archive" -C /usr/local/bin yamlfmt
        yamlfmt -version

    - name: Install actionlint
      if: ${{ inputs.profile == 'static' }}
      shell: bash
      env:
        # renovate: datasource=github-releases depName=rhysd/actionlint
        ACTIONLINT_VERSION: v1.7.12
      run: |-
        version="${ACTIONLINT_VERSION#v}"
        archive="actionlint_${version}_linux_amd64.tar.gz"
        checksum="actionlint_${version}_checksums.txt"
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT

        curl -fsSLo "$tmp/$archive" "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/${archive}"
        curl -fsSLo "$tmp/$checksum" "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/${checksum}"

        grep "  ${archive}$" "$tmp/$checksum" | (cd "$tmp" && sha256sum --check --status)
        sudo tar -xzf "$tmp/$archive" -C /usr/local/bin actionlint
        actionlint -version
