  name: platform-system-external-dns-internal
  namespace: platform-system
spec:
  dependsOn:
  - name: platform-system-envoy-gateway-config
    namespace: platform-system
  interval: 10m
  path: ./infra/platform-system/external-dns-internal/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
