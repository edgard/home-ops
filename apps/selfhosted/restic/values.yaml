---
defaultPodOptions:
  securityContext:
    fsGroup: 0
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0

controllers:
  main:
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "multus-lan-bridge",
            "namespace": "kube-system",
            "ips": ["192.168.1.244/24"],
            "gateway": ["192.168.1.1"],
            "mac": "02:42:c0:a8:01:f4"
          }]
    initContainers:
      init:
        image:
          repository: restic/rest-server
          tag: 0.14.0
        command:
          - /bin/sh
          - -c
          - |
            if [ ! -f /repository/.htpasswd ]; then
              echo "Creating htpasswd file..."
              htpasswd -Bbc /repository/.htpasswd restic "$RESTIC_PASSWORD"
            fi
        env:
          RESTIC_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
        securityContext:
          allowPrivilegeEscalation: false
    containers:
      app:
        image:
          repository: restic/rest-server
          tag: 0.14.0
        securityContext:
          allowPrivilegeEscalation: false
        command:
          - rest-server
        args:
          - --path=/repository
          - --htpasswd-file=/repository/.htpasswd
        probes:
          startup:
            enabled: true
          liveness:
            enabled: true
          readiness:
            enabled: true
  backup:
    type: cronjob
    cronjob:
      schedule: "0 3 * * *"
    pod:
      restartPolicy: OnFailure
    initContainers:
      init:
        image:
          repository: restic/restic
          tag: 0.19.0
        securityContext:
          allowPrivilegeEscalation: false
        command:
          - /bin/sh
          - -c
          - |
            if ! restic --retry-lock 30m snapshots > /dev/null 2>&1; then
              echo "Initializing restic repository..."
              restic --retry-lock 30m init
            fi
        env:
          RESTIC_REPOSITORY: rest:http://restic.selfhosted.svc.cluster.local:8000/
          RESTIC_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
          RESTIC_REST_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
          RESTIC_REST_USERNAME: restic
    containers:
      app:
        image:
          repository: restic/restic
          tag: 0.19.0
        securityContext:
          allowPrivilegeEscalation: false
        args:
          - --retry-lock
          - 30m
          - backup
          - /data/appdata
          - --host
          - homelab
          - --tag
          - appdata
          - --verbose
        env:
          RESTIC_REPOSITORY: rest:http://restic.selfhosted.svc.cluster.local:8000/
          RESTIC_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
          RESTIC_REST_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
          RESTIC_REST_USERNAME: restic
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
  maintenance:
    type: cronjob
    cronjob:
      schedule: "0 4 * * 1"
    pod:
      restartPolicy: OnFailure
    containers:
      app:
        image:
          repository: restic/restic
          tag: 0.19.0
        securityContext:
          allowPrivilegeEscalation: false
        command:
          - /bin/sh
          - -c
          - |
            echo "Running forget with retention policy..."
            restic --retry-lock 30m forget \
              --group-by host,paths,tags \
              --keep-daily 14 \
              --keep-weekly 8 \
              --keep-monthly 12 \
              --keep-yearly 3 \
              --prune \
              --verbose
            echo "Running repository metadata check..."
            restic --retry-lock 30m check --verbose
            echo "Running partial data verification..."
            restic --retry-lock 30m check --read-data-subset=10% --verbose
        env:
          RESTIC_REPOSITORY: rest:http://restic.selfhosted.svc.cluster.local:8000/
          RESTIC_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
          RESTIC_REST_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: restic-credentials
                key: RESTIC_PASSWORD
          RESTIC_REST_USERNAME: restic
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

service:
  main:
    controller: main
    ports:
      http:
        port: 8000
        protocol: TCP

persistence:
  repo:
    type: persistentVolumeClaim
    existingClaim: restic-repo
    globalMounts:
      - path: /repository
  appdata:
    type: persistentVolumeClaim
    existingClaim: restic-appdata
    advancedMounts:
      backup:
        app:
          - path: /data/appdata
            readOnly: true
