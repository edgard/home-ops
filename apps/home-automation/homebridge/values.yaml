---
defaultPodOptions:
  securityContext:
    fsGroup: 0
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0

controllers:
  main:
    type: deployment
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      annotations:
        k8tz.io/inject: "false"
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "multus-lan-bridge",
              "namespace": "kube-system",
              "ips": ["192.168.1.246/24"],
              "gateway": ["192.168.1.1"],
              "mac": "02:42:c0:a8:01:f6"
            }
          ]
    initContainers:
      init-config:
        image:
          repository: homebridge/homebridge
          tag: 2026-06-05
        command:
          - /bin/sh
          - -c
        args:
          - |
            set -eu
            mkdir -p /homebridge
            cp /usr/share/zoneinfo/Europe/Warsaw /localtime/localtime
            cp /config/config.json /homebridge/config.json
            rm -f /homebridge/accessories/cachedAccessories
            npm uninstall --prefix /homebridge homebridge-keylights bonjour-service --no-fund --no-audit || true
            npm install --prefix /homebridge homebridge-http-lightbulb@1.2.4 --omit=dev --no-fund --no-audit
        securityContext:
          privileged: true
    containers:
      app:
        image:
          repository: homebridge/homebridge
          tag: 2026-06-05
        env:
          ENABLE_AVAHI: "1"
          HOMEBRIDGE_CONFIG_UI: "1"
          HOMEBRIDGE_CONFIG_UI_PORT: "8581"
          TZ: Europe/Warsaw
        ports:
          - name: http
            containerPort: 8581
          - name: homekit
            containerPort: 51826
        probes:
          startup:
            enabled: true
            port: 8581
          liveness:
            enabled: true
            port: 8581
          readiness:
            enabled: true
            port: 8581
        securityContext:
          privileged: true

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 8581
        protocol: TCP
        targetPort: 8581
      homekit:
        enabled: true
        port: 51826
        protocol: TCP
        targetPort: 51826

route:
  main:
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Homebridge
      gethomepage.dev/group: Home Automation
      gethomepage.dev/icon: homebridge.svg
      gethomepage.dev/app: homebridge
      gatus.home-operations.com/endpoint: |
        group: home-automation
    parentRefs:
      - name: gateway
        namespace: platform-system
        sectionName: https
    hostnames:
      - homebridge.edgard.org
    rules:
      - backendRefs:
          - identifier: main
            port: 8581

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /homebridge
  config:
    type: configMap
    name: homebridge
    globalMounts:
      - path: /config/config.json
        subPath: config.json
        readOnly: true
  localtime:
    type: emptyDir
    advancedMounts:
      main:
        init-config:
          - path: /localtime
        app:
          - path: /etc/localtime
            subPath: localtime

configMaps:
  homebridge-config:
    data:
      config.json: |-
        {
          "bridge": {
            "name": "Homebridge",
            "username": "02:42:C0:A8:01:F6",
            "port": 51826,
            "pin": "518-62-349"
          },
          "accessories": [
            {
              "accessory": "HTTP-LIGHTBULB",
              "name": "Office Key Light Left",
              "debug": false,
              "onUrl": {
                "url": "http://192.168.1.40:9123/elgato/lights",
                "method": "PUT",
                "headers": {
                  "Content-Type": "application/json"
                },
                "body": "{\"numberOfLights\":1,\"lights\":[{\"on\":1}]}"
              },
              "offUrl": {
                "url": "http://192.168.1.40:9123/elgato/lights",
                "method": "PUT",
                "headers": {
                  "Content-Type": "application/json"
                },
                "body": "{\"numberOfLights\":1,\"lights\":[{\"on\":0}]}"
              },
              "statusUrl": "http://192.168.1.40:9123/elgato/lights",
              "statusPattern": "\"on\":1",
              "brightness": {
                "statusUrl": "http://192.168.1.40:9123/elgato/lights",
                "statusPattern": "\"brightness\":(\\d*)",
                "setUrl": {
                  "url": "http://192.168.1.40:9123/elgato/lights",
                  "method": "PUT",
                  "headers": {
                    "Content-Type": "application/json"
                  },
                  "body": "{\"numberOfLights\":1,\"lights\":[{\"brightness\":%s}]}"
                }
              },
              "colorTemperature": {
                "statusUrl": "http://192.168.1.40:9123/elgato/lights",
                "statusPattern": "\"temperature\":(\\d*)",
                "unit": "mired",
                "minValue": 143,
                "maxValue": 344,
                "setUrl": {
                  "url": "http://192.168.1.40:9123/elgato/lights",
                  "method": "PUT",
                  "headers": {
                    "Content-Type": "application/json"
                  },
                  "body": "{\"numberOfLights\":1,\"lights\":[{\"temperature\":%s}]}"
                }
              }
            },
            {
              "accessory": "HTTP-LIGHTBULB",
              "name": "Office Key Light Right",
              "debug": false,
              "onUrl": {
                "url": "http://192.168.1.94:9123/elgato/lights",
                "method": "PUT",
                "headers": {
                  "Content-Type": "application/json"
                },
                "body": "{\"numberOfLights\":1,\"lights\":[{\"on\":1}]}"
              },
              "offUrl": {
                "url": "http://192.168.1.94:9123/elgato/lights",
                "method": "PUT",
                "headers": {
                  "Content-Type": "application/json"
                },
                "body": "{\"numberOfLights\":1,\"lights\":[{\"on\":0}]}"
              },
              "statusUrl": "http://192.168.1.94:9123/elgato/lights",
              "statusPattern": "\"on\":1",
              "brightness": {
                "statusUrl": "http://192.168.1.94:9123/elgato/lights",
                "statusPattern": "\"brightness\":(\\d*)",
                "setUrl": {
                  "url": "http://192.168.1.94:9123/elgato/lights",
                  "method": "PUT",
                  "headers": {
                    "Content-Type": "application/json"
                  },
                  "body": "{\"numberOfLights\":1,\"lights\":[{\"brightness\":%s}]}"
                }
              },
              "colorTemperature": {
                "statusUrl": "http://192.168.1.94:9123/elgato/lights",
                "statusPattern": "\"temperature\":(\\d*)",
                "unit": "mired",
                "minValue": 143,
                "maxValue": 344,
                "setUrl": {
                  "url": "http://192.168.1.94:9123/elgato/lights",
                  "method": "PUT",
                  "headers": {
                    "Content-Type": "application/json"
                  },
                  "body": "{\"numberOfLights\":1,\"lights\":[{\"temperature\":%s}]}"
                }
              }
            }
          ],
          "platforms": [
            {
              "name": "Config",
              "port": 8581,
              "platform": "config"
            }
          ]
        }
