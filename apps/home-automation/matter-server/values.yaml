---
defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000

controllers:
  main:
    type: deployment
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      hostNetwork: true
    containers:
      app:
        image:
          repository: ghcr.io/matter-js/matterjs-server
          tag: 1.1.0
        env:
          PORT: "5580"
          PRIMARY_INTERFACE: br0
          STORAGE_PATH: /data
        ports:
          - name: ws
            containerPort: 5580
            protocol: TCP
        probes:
          startup:
            enabled: true
            spec:
              failureThreshold: 36
              periodSeconds: 10
          liveness:
            enabled: true
          readiness:
            enabled: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      ws:
        enabled: true
        port: 5580
        protocol: TCP
        targetPort: 5580

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /data
