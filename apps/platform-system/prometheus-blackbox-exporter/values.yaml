---
fullnameOverride: prometheus-blackbox-exporter

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions:
          - HTTP/1.1
          - HTTP/2.0
        follow_redirects: true
        preferred_ip_protocol: ip4
    dns_edgard_org:
      prober: dns
      timeout: 5s
      dns:
        query_name: edgard.org
        query_type: A
        valid_rcodes:
          - NOERROR
        preferred_ip_protocol: ip4
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: ip4

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_RAW

serviceMonitor:
  selfMonitor:
    enabled: true
  enabled: false
