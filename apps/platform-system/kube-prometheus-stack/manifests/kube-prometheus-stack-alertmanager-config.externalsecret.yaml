---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kube-prometheus-stack-alertmanager-config
  namespace: platform-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: external-secrets-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |-
          global:
            resolve_timeout: 5m
          route:
            group_by:
              - alertname
              - namespace
              - job
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 6h
            receiver: "null"
            routes:
              - receiver: "null"
                matchers:
                  - alertname = "Watchdog"
              - receiver: telegram
                matchers:
                  - severity = "warning"
                  - alertname =~ "^(TargetDown|ConfigReloaderSidecarErrors|AlertmanagerFailedToSendAlerts|PrometheusErrorSendingAlertsToSomeAlertmanagers|PrometheusNotConnectedToAlertmanagers|PrometheusNotificationQueueRunningFull|PrometheusKubernetesListWatchFailures|PrometheusSDRefreshFailure|PrometheusMissingRuleEvaluations|PrometheusTSDBCompactionsFailing|PrometheusTSDBReloadsFailing|PrometheusDuplicateTimestamps|PrometheusOutOfOrderTimestamps|PrometheusLabelLimitHit|PrometheusScrapeSampleLimitHit|PrometheusScrapeBodySizeLimitHit|PrometheusTargetLimitHit|PrometheusNotIngestingSamples|PrometheusOperator.*)$"
              - receiver: telegram
                matchers:
                  - severity = "critical"
          receivers:
            - name: "null"
            - name: telegram
              telegram_configs:
                - bot_token: "{{ .telegram_bot_token }}"
                  chat_id: {{ .telegram_chat_id }}
                  parse_mode: HTML
                  send_resolved: true
                  message: |-
                    {{ `{{ define "homeops.telegram.alert" -}}` }}
                    {{ `{{- with .Annotations.summary }}` }}
                    <b>{{ `{{ . | html }}` }}</b>
                    {{ `{{- end }}` }}
                    {{ `{{- with .Annotations.description }}` }}
                    <blockquote>{{ `{{ . | html }}` }}</blockquote>
                    {{ `{{- end }}` }}
                    {{ `{{- with .Labels.severity }}` }}
                    <b>Severity:</b> {{ `{{ . | title | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- with .Labels.namespace }}` }}
                    <b>Namespace:</b> <code>{{ `{{ . | html }}` }}</code>
                    {{ `{{- end }}` }}
                    {{ `{{- if .Labels.name }}` }}
                    <b>Target:</b> <code>{{ `{{ .Labels.name | html }}` }}</code>
                    {{ `{{- else if .Labels.pod }}` }}
                    <b>Target:</b> <code>{{ `{{ .Labels.pod | html }}` }}</code>
                    {{ `{{- else if .Labels.job_name }}` }}
                    <b>Target:</b> <code>{{ `{{ .Labels.job_name | html }}` }}</code>
                    {{ `{{- else if .Labels.instance }}` }}
                    <b>Target:</b> <code>{{ `{{ .Labels.instance | html }}` }}</code>
                    {{ `{{- else if .Labels.service }}` }}
                    <b>Target:</b> <code>{{ `{{ .Labels.service | html }}` }}</code>
                    {{ `{{- end }}` }}
                    {{ `{{- with .Annotations.runbook_url }}` }}
                    📖 <a href="{{ `{{ . | html }}` }}">Runbook</a>
                    {{ `{{- end }}` }}
                    {{ `{{- end -}}` }}
                    <b>🏠 Home Ops · Monitoring</b>

                    {{ `{{- if gt (len .Alerts.Firing) 0 }}` }}

                    {{ `{{ if eq .CommonLabels.severity "critical" }}` }}🔴{{ `{{ else if eq .CommonLabels.severity "warning" }}` }}⚠️{{ `{{ else }}` }}🔥{{ `{{ end }}` }} <b>FIRING · {{ `{{ .CommonLabels.alertname | html }}` }}{{ `{{ if gt (len .Alerts.Firing) 1 }}` }} ({{ `{{ len .Alerts.Firing }}` }}){{ `{{ end }}` }}</b>
                    {{ `{{- range $index, $alert := .Alerts.Firing }}` }}
                    {{ `{{- if $index }}` }}

                    ────────
                    {{ `{{- end }}` }}
                    {{ `{{ template "homeops.telegram.alert" $alert }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- if gt (len .Alerts.Resolved) 0 }}` }}

                    ✅ <b>RESOLVED · {{ `{{ .CommonLabels.alertname | html }}` }}{{ `{{ if gt (len .Alerts.Resolved) 1 }}` }} ({{ `{{ len .Alerts.Resolved }}` }}){{ `{{ end }}` }}</b>
                    {{ `{{- range $index, $alert := .Alerts.Resolved }}` }}
                    {{ `{{- if $index }}` }}

                    ────────
                    {{ `{{- end }}` }}
                    {{ `{{ template "homeops.telegram.alert" $alert }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- end }}` }}
  data:
    - secretKey: telegram_bot_token
      remoteRef:
        key: telegram_bot_token
    - secretKey: telegram_chat_id
      remoteRef:
        key: telegram_chat_id
