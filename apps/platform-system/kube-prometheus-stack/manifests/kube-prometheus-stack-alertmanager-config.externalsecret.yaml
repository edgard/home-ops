---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kube-prometheus-stack-alertmanager-config
  namespace: platform-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: external-secrets-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |-
          global:
            resolve_timeout: 5m
          route:
            group_by:
              - alertname
              - namespace
              - job
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 6h
            receiver: "null"
            routes:
              - receiver: "null"
                matchers:
                  - alertname = "Watchdog"
              - receiver: telegram
                matchers:
                  - severity = "warning"
                  - alertname =~ "^(TargetDown|ConfigReloaderSidecarErrors|AlertmanagerFailedToSendAlerts|PrometheusErrorSendingAlertsToSomeAlertmanagers|PrometheusNotConnectedToAlertmanagers|PrometheusNotificationQueueRunningFull|PrometheusKubernetesListWatchFailures|PrometheusSDRefreshFailure|PrometheusMissingRuleEvaluations|PrometheusTSDBCompactionsFailing|PrometheusTSDBReloadsFailing|PrometheusDuplicateTimestamps|PrometheusOutOfOrderTimestamps|PrometheusLabelLimitHit|PrometheusScrapeSampleLimitHit|PrometheusScrapeBodySizeLimitHit|PrometheusTargetLimitHit|PrometheusNotIngestingSamples|PrometheusOperator.*)$"
              - receiver: telegram
                matchers:
                  - severity = "critical"
          receivers:
            - name: "null"
            - name: telegram
              telegram_configs:
                - bot_token: "{{ .telegram_bot_token }}"
                  chat_id: {{ .telegram_chat_id }}
                  parse_mode: HTML
                  send_resolved: true
                  message: |-
                    {{ `{{ if eq .Status "firing" -}}` }}
                    <b>FIRING: {{ `{{ .CommonLabels.alertname | html }}` }}{{ `{{ if gt (len .Alerts.Firing) 1 }}` }} ({{ `{{ len .Alerts.Firing }}` }}){{ `{{ end }}` }}</b>
                    {{ `{{- else -}}` }}
                    <b>RESOLVED: {{ `{{ .CommonLabels.alertname | html }}` }}{{ `{{ if gt (len .Alerts.Resolved) 1 }}` }} ({{ `{{ len .Alerts.Resolved }}` }}){{ `{{ end }}` }}</b>
                    {{ `{{- end }}` }}
                    {{ `{{ range .Alerts }}` }}

                    {{ `{{- with .Annotations.summary }}` }}
                    {{ `{{ . | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- with .Annotations.description }}` }}
                    {{ `{{ . | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- with .Labels.severity }}` }}
                    Severity: {{ `{{ . | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- with .Labels.namespace }}` }}
                    Namespace: {{ `{{ . | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- if .Labels.name }}` }}
                    Target: {{ `{{ .Labels.name | html }}` }}
                    {{ `{{- else if .Labels.pod }}` }}
                    Target: {{ `{{ .Labels.pod | html }}` }}
                    {{ `{{- else if .Labels.job_name }}` }}
                    Target: {{ `{{ .Labels.job_name | html }}` }}
                    {{ `{{- else if .Labels.instance }}` }}
                    Target: {{ `{{ .Labels.instance | html }}` }}
                    {{ `{{- else if .Labels.service }}` }}
                    Target: {{ `{{ .Labels.service | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{- with .Annotations.runbook_url }}` }}
                    Runbook: {{ `{{ . | html }}` }}
                    {{ `{{- end }}` }}
                    {{ `{{ end }}` }}

                    Grafana: https://grafana.edgard.org/explore
  data:
    - secretKey: telegram_bot_token
      remoteRef:
        key: telegram_bot_token
    - secretKey: telegram_chat_id
      remoteRef:
        key: telegram_chat_id
