---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kube-prometheus-stack-alertmanager-config
  namespace: platform-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: external-secrets-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |-
          global:
            resolve_timeout: 5m
          route:
            group_by:
              - alertname
              - namespace
              - job
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 6h
            receiver: "null"
            routes:
              - receiver: "null"
                matchers:
                  - alertname = "Watchdog"
              - receiver: telegram
                matchers:
                  - severity = "critical"
          receivers:
            - name: "null"
            - name: telegram
              telegram_configs:
                - bot_token: "{{ .telegram_bot_token }}"
                  chat_id: {{ .telegram_chat_id }}
                  send_resolved: true
  data:
    - secretKey: telegram_bot_token
      remoteRef:
        key: telegram_bot_token
    - secretKey: telegram_chat_id
      remoteRef:
        key: telegram_chat_id
