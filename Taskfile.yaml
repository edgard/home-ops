---
version: "3"

silent: true
failfast: true
set:
  - errexit
  - nounset
  - pipefail
shell: bash -c

vars:
  ANSIBLE_VAULT_PASSWORD: '{{.ANSIBLE_VAULT_PASSWORD | default ""}}'
  ANSIBLE_VAULT_ARGS: '{{if .ANSIBLE_VAULT_PASSWORD}}--vault-password-file <(printf "%s\n" "$ANSIBLE_VAULT_PASSWORD"){{end}}'
  AWS_ACCESS_KEY_ID: '{{.AWS_ACCESS_KEY_ID | default ""}}'
  AWS_SECRET_ACCESS_KEY: '{{.AWS_SECRET_ACCESS_KEY | default ""}}'
  BWS_ACCESS_TOKEN: '{{.BWS_ACCESS_TOKEN | default ""}}'
  K8S_VERSION: '{{.K8S_VERSION | default ""}}'
  TERRAFORM_DIR: '{{.TERRAFORM_DIR | default (printf "%s/terraform" .TASKFILE_DIR)}}'
  TALOS_CLUSTER_NAME: '{{.TALOS_CLUSTER_NAME | default "homelab"}}'
  TALOS_INSTALL_DISK: '{{.TALOS_INSTALL_DISK | default ""}}'
  TALOS_NODE: '{{.TALOS_NODE | default ""}}'
  VENV_DIR: "{{.TASKFILE_DIR}}/.venv"
  VENV_PYTHON: "{{.VENV_DIR}}/bin/python"
  ANSIBLE_GALAXY: "{{.VENV_DIR}}/bin/ansible-galaxy"
  ANSIBLE_LINT: "{{.VENV_DIR}}/bin/ansible-lint"
  ANSIBLE_PLAYBOOK: "{{.VENV_DIR}}/bin/ansible-playbook"
  ANSIBLE_COLLECTIONS_PATH: "{{.TASKFILE_DIR}}/.ansible/collections"

env:
  ANSIBLE_VAULT_PASSWORD: "{{.ANSIBLE_VAULT_PASSWORD}}"
  AWS_ACCESS_KEY_ID: "{{.AWS_ACCESS_KEY_ID}}"
  AWS_SECRET_ACCESS_KEY: "{{.AWS_SECRET_ACCESS_KEY}}"
  BWS_ACCESS_TOKEN: "{{.BWS_ACCESS_TOKEN}}"
  TALOS_CLUSTER_NAME: "{{.TALOS_CLUSTER_NAME}}"
  TALOS_INSTALL_DISK: "{{.TALOS_INSTALL_DISK}}"
  TALOS_NODE: "{{.TALOS_NODE}}"
  TERRAFORM_DIR: "{{.TERRAFORM_DIR}}"
  K8S_VERSION: "{{.K8S_VERSION}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  deps:
    desc: Create .venv and install Ansible Python dependencies
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - python3 -m venv "{{.VENV_DIR}}"
      - '"{{.VENV_PYTHON}}" -m pip install --upgrade pip'
      - '"{{.VENV_PYTHON}}" -m pip uninstall -y ansible || true'
      - '"{{.VENV_PYTHON}}" -m pip install ansible-core ansible-lint'
      - '"{{.ANSIBLE_GALAXY}}" collection install -r ansible/requirements.yml -p "{{.ANSIBLE_COLLECTIONS_PATH}}"'
      - '"{{.VENV_PYTHON}}" -m pip install -r ansible/requirements.txt'

  ansible:check:
    internal: true
    desc: Verify local Ansible virtualenv exists
    preconditions:
      - sh: test -x "{{.ANSIBLE_PLAYBOOK}}"
        msg: Run `task deps` to create .venv and install Ansible dependencies.
      - sh: test -x "{{.ANSIBLE_LINT}}"
        msg: Run `task deps` to create .venv and install Ansible dependencies.
    cmds:
      - true

  # Vault maintenance
  vault:edit-talos:
    desc: Edit encrypted Talos bootstrap secrets
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - ANSIBLE_VAULT_PASSWORD
    cmds:
      - '"{{.VENV_DIR}}/bin/ansible-vault" edit {{.ANSIBLE_VAULT_ARGS}} ansible/roles/talos/files/secrets.vault.yml'

  # Quality gate and local development
  fmt:
    desc: Format all code
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - prettier --write "**/*.{yaml,yml}"
      - yamlfmt "**/*.{yaml,yml}"
      - tofu fmt -recursive

  lint:
    desc: Run the offline validation checks
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    cmds:
      - shellcheck --severity=warning scripts/*.sh
      - yamllint -c .yamllint .
      - for playbook in ansible/playbooks/*.yml ansible/tests/*.yml; do "{{.ANSIBLE_PLAYBOOK}}" --syntax-check "$playbook"; done
      - '"{{.ANSIBLE_LINT}}" ansible'
      - for test in ansible/tests/*.yml; do "{{.ANSIBLE_PLAYBOOK}}" "$test"; done
      - '"{{.TASKFILE_DIR}}/scripts/validate-kubernetes.sh"'
      - tf_data_dir=$(mktemp -d) && trap 'rm -rf "$tf_data_dir"' EXIT && cd terraform && TF_DATA_DIR="$tf_data_dir" tofu init -upgrade -backend=false >/dev/null 2>&1 && TF_DATA_DIR="$tf_data_dir" tofu validate

  precommit:
    desc: Format code and run the offline validation checks
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - task: fmt
      - task: lint

  # High-level cluster lifecycle
  cluster:create:
    desc: Install, configure, and bootstrap Talos + platform
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
        - TALOS_CLUSTER_NAME
        - TALOS_INSTALL_DISK
        - ANSIBLE_VAULT_PASSWORD
        - BWS_ACCESS_TOKEN
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" {{.ANSIBLE_VAULT_ARGS}} ansible/playbooks/cluster-create.yml'

  cluster:destroy:
    desc: Destroy platform and reset Talos node
    interactive: true
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/cluster-destroy.yml'

  # Talos operations
  talos:gen:
    desc: Generate Talos config into ~/.talos
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
        - TALOS_CLUSTER_NAME
        - TALOS_INSTALL_DISK
        - ANSIBLE_VAULT_PASSWORD
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" {{.ANSIBLE_VAULT_ARGS}} ansible/playbooks/talos-generate.yml'

  talos:apply:
    desc: Apply Talos config to control plane
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/talos-apply.yml'

  talos:bootstrap:
    desc: Bootstrap Talos control plane and kubeconfig
    interactive: true
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
        - TALOS_CLUSTER_NAME
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/talos-bootstrap.yml'

  talos:upgrade:
    desc: Upgrade Talos on a node from the repo target version
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/talos-upgrade.yml'

  talos:upgrade-k8s:
    desc: Upgrade Kubernetes control plane
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - TALOS_NODE
        - K8S_VERSION
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/talos-upgrade-k8s.yml -e "k8s_version={{.K8S_VERSION}}"'

  # Platform and Argo operations
  platform:create:
    desc: Create platform components via Ansible
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - BWS_ACCESS_TOKEN
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/platform-bootstrap.yml'

  platform:destroy:
    desc: Destroy platform components via Ansible
    interactive: true
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/platform-destroy.yml'

  argo:sync:
    desc: Force Argo CD Applications to refresh
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    vars:
      app: '{{.app | default ""}}'
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/argo-refresh.yml {{if .app}}-e "app={{.app}}"{{end}}'

  # Terraform operations
  tf:plan:
    desc: Terraform plan
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
        - BWS_ACCESS_TOKEN
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/terraform-plan.yml'

  tf:apply:
    desc: Terraform apply
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    requires:
      vars:
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
        - BWS_ACCESS_TOKEN
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/terraform-apply.yml'

  tf:clean:
    desc: Clean terraform state/cache
    dir: "{{.TASKFILE_DIR}}"
    deps:
      - task: ansible:check
    cmds:
      - '"{{.ANSIBLE_PLAYBOOK}}" ansible/playbooks/terraform-clean.yml'
